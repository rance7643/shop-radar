name: Shop Radar

on:
  schedule:
    - cron: "0 7,13 * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install playwright folium requests
          playwright install --with-deps chromium

      - name: Run radar
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: |
          python radar.py

      - name: Commit updated sent_ids and map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_ids.json
          git diff --staged --quiet || git commit -m "Update radar state"
          git push
