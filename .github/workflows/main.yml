name: Shop Radar

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install playwright folium requests
          playwright install --with-deps chromium

      - name: Run radar
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: |
          python radar.py
